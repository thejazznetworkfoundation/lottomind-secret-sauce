<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200" viewBox="0 0 800 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#02050d"/>
      <stop offset="0.45" stop-color="#07192b"/>
      <stop offset="1" stop-color="#050308"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4b8"/>
      <stop offset="0.45" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#8a6815"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="50%" cy="18%" r="62%">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0.42"/>
      <stop offset="0.52" stop-color="#00e5ff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="brainClip">
      <rect x="104" y="92" width="592" height="440" rx="38"/>
    </clipPath>
    <clipPath id="coinClip">
      <circle cx="400" cy="430" r="96"/>
    </clipPath>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="800" height="1200" fill="url(#bg)"/>
  <rect width="800" height="1200" fill="url(#cyanGlow)"/>
  <rect x="42" y="42" width="716" height="1116" rx="42" fill="none" stroke="url(#gold)" stroke-width="5"/>
  <rect x="66" y="66" width="668" height="1068" rx="34" fill="none" stroke="#d4af37" stroke-opacity="0.22" stroke-width="2"/>

  <g filter="url(#softShadow)">
    <rect x="104" y="92" width="592" height="440" rx="38" fill="#061327" stroke="#d4af37" stroke-opacity="0.42" stroke-width="3"/>
    <image href="/ebooks/lottomind-live-logo-brain.png" x="104" y="28" width="592" height="592" preserveAspectRatio="xMidYMid slice" clip-path="url(#brainClip)"/>
    <rect x="104" y="92" width="592" height="440" rx="38" fill="none" stroke="#7de8ff" stroke-opacity="0.25" stroke-width="2"/>
  </g>

  <g filter="url(#softShadow)">
    <circle cx="400" cy="430" r="104" fill="#030711" stroke="url(#gold)" stroke-width="5"/>
    <image href="/ebooks/lottomind-live-logo-lm.png" x="304" y="334" width="192" height="192" preserveAspectRatio="xMidYMid slice" clip-path="url(#coinClip)"/>
    <circle cx="400" cy="430" r="96" fill="none" stroke="#00e5ff" stroke-opacity="0.38" stroke-width="4"/>
  </g>

  <text x="400" y="632" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900" fill="#7de8ff" letter-spacing="5">LOTTOMIND LIVE</text>
  <text x="400" y="736" text-anchor="middle" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="78" font-weight="900" fill="#ffffff">TOOLS</text>
  <text x="400" y="820" text-anchor="middle" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="74" font-weight="900" fill="#ffffff">GUIDE</text>
  <text x="400" y="886" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800" fill="#d4af37">Common Joe User Manual</text>

  <g transform="translate(108 940)">
    <rect x="0" y="0" width="584" height="118" rx="26" fill="#08111f" stroke="#d4af37" stroke-opacity="0.35"/>
    <text x="292" y="43" text-anchor="middle" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="30" fill="#ffffff">Dream. Analyze. Play Smart.</text>
    <text x="292" y="82" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#b9c7d7">Power Tools, Heatmaps, Dreams, Credits, Arcade</text>
  </g>

  <g transform="translate(132 1082)">
    <rect width="536" height="56" rx="28" fill="url(#gold)"/>
    <text x="268" y="37" text-anchor="middle" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="25" fill="#0b0a08">FREE BESTSELLER PDF</text>
  </g>
</svg>
