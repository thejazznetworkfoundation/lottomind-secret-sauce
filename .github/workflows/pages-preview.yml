name: Build Web Preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-preview-build
  cancel-in-progress: true

jobs:
  build:
    name: Build Expo web preview
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Type check
        run: npm run typecheck

      - name: Export static web app
        run: npm run web:export

      - name: Add GitHub Pages fallbacks
        run: |
          touch dist/.nojekyll
          cp dist/index.html dist/404.html

      - name: Upload web preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: lottomind-web-preview
          path: expo/dist
